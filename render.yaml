# Deploy to Render.com
# 1. Push this repo to GitHub
# 2. Go to render.com → New → Web Service
# 3. Connect your GitHub repo
# 4. Set SESSION_COOKIES env var with your cookies JSON

services:
  - type: web
    name: cursor-invite-monitor
    runtime: docker
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "10000"
      - key: SESSION_COOKIES
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: CHECK_INTERVAL
        value: "5"
      - key: ACCOUNT_NAME
        value: "Adrian Max - Hanwha Team"
      - key: KNOWN_INVITE_LINK
        sync: false
